<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bin Blasters — Residential Bin Cleaning</title>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    body { background:#0b2414; color:#edfce4; font-family:'DM Sans',sans-serif; margin:0; }
    input,select,textarea { color-scheme:dark; }
    select option { background:#1d3e27; color:#edfce4; }
    html { scroll-behavior:smooth; }
  </style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const API_BASE = "https://usbzzreulhkvsfapwavs.supabase.co/functions/v1/make-server-be3cc62a";
const FORMSPREE = "https://formspree.io/f/mwvdrdaw";

function generateSlots(day) {
  const slots = [];
  const [startH, startM, endH, endM] = day === 1 ? [8,0,17,0] : [17,0,19,0];

  let h = startH, m = startM;
  while (h < endH || (h === endH && m < endM)) {
    const period = h < 12 ? "AM" : "PM";
    const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
    slots.push(`${h12}:${m.toString().padStart(2,"0")} ${period}`);
    m += 15;
    if (m >= 60) { m -= 60; h++; }
  }
  return slots;
}

function getAvailableDates() {
  const dates = [];
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(today);

  for (let i = 0; i < 90; i++) {
    d.setDate(d.getDate() + 1);
    const day = d.getDay();
    if (day === 1 || day === 2) {
      dates.push({
        value: d.toISOString().split("T")[0],
        label: d.toLocaleDateString("en-US", { weekday:"long", month:"short", day:"numeric" }),
        day,
      });
    }
  }
  return dates;
}

function Err({ msg }) {
  return <div style={{ color:"#d4183d", fontSize:"12px", marginTop:"6px" }}>⚠ {msg}</div>;
}

function App() {
  const availableDates = useMemo(() => getAvailableDates(), []);

  const [form, setForm] = useState({
    address:"", service:"", phone:"", email:"",
    date:"", time:"", util:false, notes:""
  });

  const [done, setDone] = useState(false);
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [errs, setErrs] = useState({});
  const [bookedSlots, setBookedSlots] = useState([]);
  const [loadingSlots, setLoadingSlots] = useState(false);

  const set = (k,v) => setForm(f => ({ ...f, [k]: v }));

  const selectedDateInfo = useMemo(
    () => availableDates.find(d => d.value === form.date),
    [form.date, availableDates]
  );

  const allSlots = useMemo(
    () => selectedDateInfo ? generateSlots(selectedDateInfo.day) : [],
    [selectedDateInfo]
  );

  const availableSlots = useMemo(
    () => allSlots.filter(t => !bookedSlots.includes(t)),
    [allSlots, bookedSlots]
  );

  useEffect(() => {
    if (!form.date) return;

    setLoadingSlots(true);
    fetch(`${API_BASE}/bookings/${form.date}`)
      .then(r => r.json())
      .then(d => setBookedSlots(d.booked ?? []))
      .catch(() => setBookedSlots([]))
      .finally(() => setLoadingSlots(false));
  }, [form.date]);

  const validate = () => {
    const e = {};
    if (!form.address) e.address = "Required";
    if (!form.service) e.service = "Required";
    if (!form.phone) e.phone = "Required";
    if (!form.email) e.email = "Required";
    if (!form.date) e.date = "Required";
    if (!form.time) e.time = "Required";
    if (!form.util) e.util = "Required";
    return e;
  };

  const submit = async (ev) => {
    ev.preventDefault();

    const e = validate();
    if (Object.keys(e).length) {
      setErrs(e);
      return;
    }

    setErrs({});
    setBusy(true);
    setErr("");

    try {
      // reserve slot
      const slotRes = await fetch(`${API_BASE}/bookings`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ date:form.date, time:form.time })
      });

      if (slotRes.status === 409) {
        setErr("That time was just taken. Pick another.");
        const refreshed = await fetch(`${API_BASE}/bookings/${form.date}`).then(r => r.json());
        setBookedSlots(refreshed.booked ?? []);
        setForm(f => ({ ...f, time:"" }));
        return;
      }

      if (!slotRes.ok) throw new Error("Slot failed");

      // ✅ FIXED FORMSPREE (FormData version)
      const formData = new FormData();
      formData.append("Service Address", form.address);
      formData.append("Service", form.service === "one" ? "1 Bin — $15" : "2 Bins — $25");
      formData.append("Phone", form.phone);
      formData.append("Email", form.email);
      formData.append("Preferred Date", selectedDateInfo?.label ?? form.date);
      formData.append("Preferred Time", form.time);
      formData.append("Utility Permission", "Granted");
      formData.append("Special Requests", form.notes || "None");

      const emailRes = await fetch(FORMSPREE, {
        method:"POST",
        body: formData,
        headers:{ Accept:"application/json" }
      });

      if (!emailRes.ok) {
        console.log(await emailRes.text());
        throw new Error("Email failed");
      }

      setDone(true);

    } catch (error) {
      console.log(error);
      setErr("Booking failed — please try again.");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{ padding:40 }}>
      <h1>Bin Blasters Booking</h1>

      {done ? (
        <h2>Booking Confirmed ✅</h2>
      ) : (
        <form onSubmit={submit} style={{ display:"flex", flexDirection:"column", gap:10, maxWidth:400 }}>

          <input placeholder="Address"
            value={form.address}
            onChange={e=>set("address",e.target.value)} />

          <input placeholder="Phone"
            value={form.phone}
            onChange={e=>set("phone",e.target.value)} />

          <input placeholder="Email"
            value={form.email}
            onChange={e=>set("email",e.target.value)} />

          <button disabled={busy}>
            {busy ? "Loading..." : "Submit Booking"}
          </button>

          {err && <Err msg={err} />}
        </form>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
